<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — Wallstreet Shoppee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand"><span class="mark">OBC</span> Official Black Card</a>
    <div class="nav-links">
      <a href="shop.html">Shoppe</a>
      <a href="cart.html">Cart</a>
      <a href="profile.html">Profile</a>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
      <a href="cart.html" class="cart-link">&#128722;<span id="cartCount" class="cart-badge" style="display:none;">0</span></a>
    </div>
    <button class="nav-toggle" aria-label="Menu">&#9776;</button>
  </div>
</nav>

<header class="hero" style="padding-bottom:10px;">
  <div class="container">
    <span class="eyebrow">&#9679; Checkout</span>
    <h1 style="font-size:clamp(1.8rem,4vw,2.4rem);">Checkout</h1>
    <p class="lead">One checkout, any shop — just like the app on your phone.</p>
  </div>
</header>

<section class="section" style="padding-top:10px;">
  <div class="container" style="max-width:640px;">

    <div id="shippingStep">
      <div class="card">
        <h3>Shipping information</h3>
        <form id="shipForm" style="display:grid; gap:12px; margin-top:12px;">
          <input required id="shipName" placeholder="Full name" style="padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
          <input required id="shipAddress" placeholder="Street address" style="padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
          <div style="display:flex; gap:10px;">
            <input required id="shipCity" placeholder="City" style="flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
            <input required id="shipState" placeholder="State" style="width:90px;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
            <input required id="shipZip" placeholder="Zip" style="width:110px;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
          </div>
          <button type="submit" class="btn btn-primary">Continue to Payment &rarr;</button>
        </form>
      </div>
    </div>

    <div id="orderSummaryCard" style="display:none;"></div>
    <div id="paymentStep" style="display:none;"></div>
    <div id="confirmStep" style="display:none;"></div>

  </div>
</section>

<footer class="footer">
  <div class="container center"><p>&copy; 2026 Official Black Card &middot; Crystal Lynn Creates</p></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/shop-supabase.js"></script>
<script src="js/app.js"></script>
<script>
  let shippingInfo = null;
  let me = null;

  document.getElementById("shipForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    me = await obcRequireMember();
    if (!me) return;
    shippingInfo = {
      name: document.getElementById("shipName").value,
      address: document.getElementById("shipAddress").value,
      city: document.getElementById("shipCity").value,
      state: document.getElementById("shipState").value,
      zip: document.getElementById("shipZip").value,
    };
    document.getElementById("shippingStep").style.display = "none";
    await renderOrderSummary();
    renderPaymentStep();
  });

  async function groupCartBySeller() {
    const groups = {};
    for (const l of cartLines()) {
      const key = l.product.shop_id;
      if (!groups[key]) groups[key] = { shop: await getMemberShopById(key), lines: [] };
      groups[key].lines.push(l);
    }
    return Object.values(groups);
  }

  async function renderOrderSummary() {
    const groups = await groupCartBySeller();
    const card = document.getElementById("orderSummaryCard");
    card.style.display = "block";
    card.className = "card";
    card.innerHTML = `
      <h3>Order summary</h3>
      ${groups.map(g => `
        <div style="margin:12px 0; padding-bottom:12px; border-bottom:1px solid var(--line);">
          <div class="muted" style="font-size:.8rem; text-transform:uppercase; letter-spacing:.04em;">${g.shop ? g.shop.name : "Shop"}</div>
          ${g.lines.map(l => `<div style="display:flex; justify-content:space-between; font-size:.92rem; margin-top:4px;"><span>${l.qty} × ${l.product.title}${l.variant ? " (" + l.variant + ")" : ""}</span><span>$${(Number(l.product.price) * l.qty).toFixed(2)}</span></div>`).join("")}
        </div>`).join("")}
      <div style="display:flex; justify-content:space-between; font-weight:700; font-size:1.1rem; margin-top:8px;">
        <span>Total</span><span class="price-now">$${cartTotal().toFixed(2)}</span>
      </div>
    `;
  }

  function renderPaymentStep() {
    const step = document.getElementById("paymentStep");
    step.style.display = "block";
    step.innerHTML = `
      <div class="card" style="margin-top:20px;">
        <div class="section-head" style="margin-left:0; margin-bottom:16px;"><span class="kicker">Step 2</span><h2>Payment</h2></div>
        <form id="payForm" style="display:grid; gap:12px;">
          <input required id="cardName" placeholder="Name on card" style="padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
          <input required id="cardNumber" inputmode="numeric" maxlength="19" placeholder="Card number" style="padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
          <div style="display:flex; gap:10px;">
            <input required id="cardExp" placeholder="MM/YY" style="flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
            <input required id="cardCvc" inputmode="numeric" maxlength="4" placeholder="CVC" style="flex:1;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--cream);" />
          </div>
          <button type="submit" class="btn btn-primary">Place Order — $<span id="payTotal">${cartTotal().toFixed(2)}</span></button>
        </form>
        <p class="muted" style="margin-top:12px; font-size:.78rem;">Demo checkout — no real payment is processed or stored. A live launch would connect a licensed payment processor here.</p>
      </div>
    `;
    document.getElementById("payForm").addEventListener("submit", (e) => {
      e.preventDefault();
      placeTheOrder();
    });
  }

  async function placeTheOrder() {
    const order = await placeOrder(shippingInfo, me.id);
    document.getElementById("orderSummaryCard").style.display = "none";
    document.getElementById("paymentStep").style.display = "none";
    const step = document.getElementById("confirmStep");
    step.style.display = "block";
    if (!order) {
      step.innerHTML = `<div class="card" style="text-align:center; padding:40px 24px;"><p>Something went wrong placing your order. Please try again.</p></div>`;
      return;
    }
    step.innerHTML = `
      <div class="card" style="border-color: rgba(0,196,140,0.4); text-align:center; padding:40px 24px;">
        <div style="font-size:2.4rem;">&#9989;</div>
        <h2>Order placed</h2>
        <p>Order confirmed — $${Number(order.total).toFixed(2)} total.</p>
        <p class="muted">Shipping to ${shippingInfo.name}, ${shippingInfo.address}, ${shippingInfo.city}, ${shippingInfo.state} ${shippingInfo.zip}</p>
        <a href="shop.html" class="btn btn-ghost" style="margin-top:16px;">Continue shopping &rarr;</a>
      </div>
    `;
  }
</script>
</body>
</html>
