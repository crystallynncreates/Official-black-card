<script src="js/app.js"></script>
<script>
  function initials(name) { return name.split(" ").map(p => p[0]).join("").slice(0, 2).toUpperCase(); }
  const GRADIENTS = ["linear-gradient(135deg, var(--gold), var(--coral))", "linear-gradient(135deg, var(--emerald), var(--violet))", "linear-gradient(135deg, var(--coral), var(--violet))", "linear-gradient(135deg, var(--gold), var(--emerald))"];

  let me = null;
  let activeId = null;
  let activeName = "";
  let realtimeChannel = null;

  async function getMyConversations() {
    const { data: rows } = await obcClient.from("obc_conversation_participants").select("conversation_id").eq("member_id", me.id);
    if (!rows || !rows.length) return [];
    const convos = await Promise.all(rows.map(async (r) => {
      const [{ data: others }, { data: lastMsgs }] = await Promise.all([
        obcClient.from("obc_conversation_participants").select("member_id, obc_members(first_name,last_name)").eq("conversation_id", r.conversation_id).neq("member_id", me.id),
        obcClient.from("obc_messages").select("body,sender_id").eq("conversation_id", r.conversation_id).order("created_at", { ascending: false }).limit(1),
      ]);
      const other = others && others[0];
      return {
        id: r.conversation_id,
        name: other && other.obc_members ? `${other.obc_members.first_name} ${other.obc_members.last_name}` : "Member",
        last: lastMsgs && lastMsgs[0] ? lastMsgs[0] : null,
      };
    }));
    return convos;
  }

  async function renderList() {
    const convs = await getMyConversations();
    if (!activeId && convs.length) { activeId = convs[0].id; activeName = convs[0].name; }
    const list = document.getElementById("convList");
    if (!convs.length) { list.innerHTML = `<p class="muted" style="padding:16px;">No conversations yet — start one above.</p>`; return; }
    list.innerHTML = "";
    convs.forEach((c, i) => {
      const item = document.createElement("div");
      item.className = "conv-item" + (c.id === activeId ? " active" : "");
      item.innerHTML = `
        <div class="avatar" style="background:${GRADIENTS[i % GRADIENTS.length]};">${initials(c.name)}</div>
        <div style="flex:1; min-width:0;">
          <strong style="font-size:.92rem;">${c.name}</strong>
          <div class="prev">${c.last ? ((c.last.sender_id === me.id ? "You: " : "") + c.last.body) : "Say hello..."}</div>
        </div>
      `;
      item.onclick = () => { activeId = c.id; activeName = c.name; renderList(); renderThread(); };
      list.appendChild(item);
    });
  }

  async function renderThread() {
    if (!activeId) { document.getElementById("msgScroll").innerHTML = ""; return; }
    const { data: msgs } = await obcClient.from("obc_messages").select("body,sender_id,created_at").eq("conversation_id", activeId).order("created_at", { ascending: true });
    const scroll = document.getElementById("msgScroll");
    scroll.innerHTML = (msgs || []).map(m => `
      <div class="bubble ${m.sender_id === me.id ? "me" : "them"}">${m.body}<span class="time">${new Date(m.created_at).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}</span></div>
    `).join("");
    scroll.scrollTop = scroll.scrollHeight;

    if (realtimeChannel) obcClient.removeChannel(realtimeChannel);
    realtimeChannel = obcClient
      .channel("messages-" + activeId)
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "obc_messages", filter: `conversation_id=eq.${activeId}` }, () => {
        renderThread();
        renderList();
      })
      .subscribe();
  }

  document.getElementById("sendBtn").addEventListener("click", send);
  document.getElementById("msgInput").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });
  async function send() {
    const input = document.getElementById("msgInput");
    if (!input.value.trim() || !activeId) return;
    await obcClient.from("obc_messages").insert({ conversation_id: activeId, sender_id: me.id, body: input.value.trim() });
    input.value = "";
    renderThread();
    renderList();
  }

  document.getElementById("startConvoBtn").addEventListener("click", async () => {
    const select = document.getElementById("newConvoSelect");
    const otherId = select.value;
    if (!otherId) return;
    const { data: newId, error } = await obcClient.rpc("obc_start_conversation", { p_other_member_id: otherId });
    if (error) { alert(error.message); return; }
    activeId = newId;
    activeName = select.options[select.selectedIndex].text;
    await renderList();
    await renderThread();
  });

  async function loadMemberOptions() {
    const { data: others } = await obcClient.from("obc_members").select("id,first_name,last_name").neq("id", me.id).order("first_name");
    const select = document.getElementById("newConvoSelect");
    if (!others || !others.length) {
      select.innerHTML = `<option value="">No other members yet</option>`;
      document.getElementById("startConvoBtn").disabled = true;
      return;
    }
    select.innerHTML = others.map(o => `<option value="${o.id}">${o.first_name} ${o.last_name}</option>`).join("");
  }

  (async () => {
    me = await obcRequireMember();
    if (!me) return;
    await loadMemberOptions();
    await renderList();
    await renderThread();
  })();
</script>
