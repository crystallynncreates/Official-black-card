<section class="section" style="padding-top:24px;">
  <div class="container" id="storeRoot" style="max-width:1100px;">
    <p class="muted">Loading shop...</p>
  </div>
</section>

<footer class="footer">
  <div class="container center"><p style="margin-bottom:10px;">&copy; 2026 Official Black Card</p><img src="img/clc-logo.png" alt="Crystal Lynn Creates" style="width:52px;height:52px;object-fit:contain;margin:0 auto;opacity:.9;display:block;" /></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/shop-supabase.js"></script>
<script src="js/app.js"></script>
<script>obcRequireMember();</script>
<script>
  const params = new URLSearchParams(location.search);
  const shopId = params.get("shop");
  const root = document.getElementById("storeRoot");

  (async () => {
    const shop = await getMemberShopById(shopId);
    if (!shop) {
      root.innerHTML = `<p class="muted">Shop not found. <a href="shop.html" style="color:var(--gold-bright);">Back to the Shoppe &rarr;</a></p>`;
      return;
    }
    const products = await getMemberProductsByShop(shop.id);
    root.innerHTML = `
      <div class="shop-banner" style="background:linear-gradient(160deg, var(--gold), var(--coral));"></div>
      <div class="shop-header">
        ${shop.logo_url
          ? `<img src="${shop.logo_url}" alt="${shop.name}" class="shop-avatar-lg" style="object-fit:cover;" />`
          : `<div class="shop-avatar-lg" style="background:linear-gradient(160deg, var(--gold), var(--coral));">${shop.name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase()}</div>`}
        <div style="flex:1;">
          <h1 style="font-size:1.5rem; margin-bottom:2px;">${shop.name}</h1>
        </div>
      </div>
      <p style="margin:20px 0 0;">${shop.bio || ""}</p>
      <p class="muted" style="font-size:.85rem;">Category: ${shop.category}</p>

      <div class="section-head" style="margin-top:32px;"><span class="kicker">Products</span><h2>${products.length} item${products.length === 1 ? "" : "s"}</h2></div>
      <div class="grid grid-4" id="shopProductsGrid"></div>
    `;
    const grid = document.getElementById("shopProductsGrid");
    if (!products.length) {
      grid.innerHTML = `<p class="muted">This shop hasn't listed any products yet.</p>`;
    }
    products.forEach(p => {
      const discount = p.original_price ? Math.round(100 - (p.price / p.original_price) * 100) : null;
      const card = document.createElement("a");
      card.href = `product.html?id=${p.id}`;
      card.className = "product-card";
      card.style.textDecoration = "none";
      card.innerHTML = `
        <div class="product-thumb" style="${p.image_url ? "" : "background:linear-gradient(160deg, var(--emerald), var(--violet));"}">${p.image_url ? `<img src="${p.image_url}" alt="${p.title}" style="width:100%;height:100%;object-fit:cover;" />` : "&#128230;"}${discount ? `<span class="badge">-${discount}%</span>` : ""}</div>
        <div class="product-info">
          <h4>${p.title}</h4>
          <div class="price-row"><span class="price-now">$${Number(p.price).toFixed(2)}</span>${p.original_price ? `<span class="price-was">$${Number(p.original_price).toFixed(2)}</span>` : ""}</div>
        </div>`;
      grid.appendChild(card);
    });
  })();
</script>
</body>
</html>
