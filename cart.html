<script>
  function render() {
    const root = document.getElementById("cartRoot");
    const lines = cartLines();
    if (!lines.length) {
      root.innerHTML = `<p class="muted">Your cart is empty. <a href="shop.html" style="color:var(--gold-bright);">Browse the Shoppe &rarr;</a></p>`;
      return;
    }
    root.innerHTML = `
      <div class="card">
        ${lines.map(l => `
          <div class="cart-line">
            <div class="thumb" style="${l.product.image_url ? "" : "background:linear-gradient(160deg, var(--gold), var(--coral));"}">${l.product.image_url ? `<img src="${l.product.image_url}" alt="${l.product.title}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />` : "&#128230;"}</div>
            <div class="grow">
              <strong>${l.product.title}</strong>
              ${l.variant ? `<div class="muted" style="font-size:.85rem;">${l.variant}</div>` : ""}
              <div class="price-now" style="margin-top:4px;">$${Number(l.product.price).toFixed(2)}</div>
            </div>
            <div class="qty-stepper">
              <button onclick="changeLine('${l.productId}','${l.variant}',${l.qty - 1})">&minus;</button>
              <span>${l.qty}</span>
              <button onclick="changeLine('${l.productId}','${l.variant}',${l.qty + 1})">+</button>
            </div>
            <button class="action-btn" onclick="removeLine('${l.productId}','${l.variant}')">&#10005;</button>
          </div>
        `).join("")}
      </div>
      <div class="card" style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div class="muted">Subtotal</div>
          <div class="price-now" style="font-size:1.4rem;">$${cartTotal().toFixed(2)}</div>
        </div>
        <a href="checkout.html" class="btn btn-primary">Checkout &rarr;</a>
      </div>
    `;
  }
  function changeLine(id, variant, qty) { updateCartLineQty(id, variant, qty); render(); }
  function removeLine(id, variant) { removeFromCart(id, variant); render(); }
  render();
</script>
